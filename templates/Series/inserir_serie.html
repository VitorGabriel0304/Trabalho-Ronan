{% extends "base.html" %}

{% block conteudo %}
<div class="linha-centro">
  <div class="cadastro-card">
    <h2>{{ '📺 Editar Série' if serie else '📺 Cadastrar Série' }}</h2>

    <form action="{{ url_for('editar_serie', id=serie.id) if serie else url_for('inserir_series') }}" method="POST">
      <label for="titulo">Título</label>
      <input type="text" name="titulo" id="titulo" value="{{ serie.titulo if serie else '' }}" placeholder="Título da série" required />

      <label for="ano">Ano de Lançamento</label>
      <input type="number" name="ano" id="ano" value="{{ serie.ano if serie else '' }}" placeholder="Ex: 2024" required />

      <label for="genero">Gênero</label>
      <select name="genero" id="genero" required>
        <option value="" disabled {{ 'selected' if not serie else '' }}>Selecione o gênero</option>
        {% for g in generos %}
        <option value="{{ g }}" {{ 'selected' if serie and serie.genero == g else '' }}>{{ g }}</option>
        {% endfor %}
      </select>

      <label for="faixa_etaria">Faixa Etária</label>
      <input type="number" name="faixa_etaria" id="faixa_etaria" value="{{ serie.faixa_etaria if serie else '' }}" placeholder="Ex: 12 (0 para Livre)" required />

      <label for="temporadas">Número de Temporadas</label>
      <input type="number" name="temporadas" id="temporadas" value="{{ serie.temporadas if serie else '' }}" placeholder="Ex: 5" required />

      <label for="capa">URL da Capa (opcional)</label>
      <input type="text" name="capa" id="capa" value="{{ serie.capa if serie else '' }}" placeholder="Ex: /static/imgs/foto.jpg" />

      <button type="submit" class="botao-form">{{ 'Salvar Alterações' if serie else 'Cadastrar Série' }}</button>
    </form>

    <div class="ja-tem-conta">
      <a href="{{ url_for('listar_series') }}"> ⬅ Voltar para lista </a>
    </div>
  </div>
</div>
{% endblock %}

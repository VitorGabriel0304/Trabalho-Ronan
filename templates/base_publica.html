<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CineList</title>

    <!-- Bootstrap (pra deixar tudo bonito rápido) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS do projeto -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body class="bg-dark text-light">

<!-- CONTEÚDO PRINCIPAL -->
<div class="container mt-5">

    <!-- mensagens (tipo sucesso, erro, etc) -->
    {% with mensagens = get_flashed_messages(with_categories=true) %}
        {% if mensagens %}
            {% for categoria, msg in mensagens %}
                <div class="alert alert-{{ categoria }}">
                    {{ msg }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <!-- aqui entra o conteúdo das páginas -->
    {% block conteudo %}{% endblock %}

</div>

<!-- RODAPÉ -->
<footer class="bg-black text-center text-light mt-5 p-3">
    @2026 Vitor Gabriel Vido & Rhian Esteves 
</footer>

<!-- Bootstrap JS (pra alguns componentes funcionarem) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CineList</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS do projeto -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body class="fundo-publico text-light">

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="conteudo-principal">

        <div class="container mt-5">

            <!-- Mensagens flash -->
            {% with mensagens = get_flashed_messages(with_categories=true) %}
                {% if mensagens %}
                    {% for categoria, msg in mensagens %}
                        <div class="alert alert-{{ categoria }} msg-flash">
                            {{ msg }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <!-- Conteúdo das páginas -->
            {% block conteudo %}{% endblock %}

        </div>

    </main>

    <!-- RODAPÉ -->
    <footer class="rodape-publico bg-black text-center text-light p-3">
        @2026 Vitor Gabriel Vido & Rhian Esteves
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

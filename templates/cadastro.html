{% extends "base_publica.html" %}

{% block conteudo %}

<div style="display:flex; justify-content:center; align-items:center; height:100vh;">
    <div class="cadastro-card">

        <h2>Criar Conta</h2>

        <form method="POST">

            <!-- Nome -->
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" placeholder="Seu nome" required>

            <!-- E-mail -->
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="Digite seu E-mail" required>

            <!-- Senha -->
            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
            <small id="forca-senha" style="display:block; margin-top:5px;"></small>

            <!-- Confirmar Senha -->
            <label for="confirmar-senha">Confirmar Senha</label>
            <input type="password" id="confirmar-senha" name="confirmar" placeholder="Repita a senha" required>

            <!-- Botão Criar Conta -->
            <button type="submit" class="botao-form">Criar Conta</button>
        </form>

        <!-- Link para login -->
        <div class="ja-tem-conta">
            Já tem conta? <a href="{{ url_for('login') }}">Fazer login</a>
        </div>

    </div>
</div>

{% endblock %}

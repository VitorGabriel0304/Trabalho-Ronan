{% extends "base.html" %}

{% block conteudo %}
<div class="linha-centro">
  <div class="cadastro-card">
    <h2>{{ '🎬 Editar Filme' if filme else '🎬 Cadastrar Filme' }}</h2>

    <form action="{{ url_for('editar_filme', id=filme.id) if filme else url_for('inserir_filmes') }}" method="POST">
      <label for="titulo">Título</label>
      <input type="text" name="titulo" id="titulo" value="{{ filme.titulo if filme else '' }}" placeholder="Título do filme" required />

      <label for="ano">Ano de Lançamento</label>
      <input type="number" name="ano" id="ano" value="{{ filme.ano if filme else '' }}" placeholder="Ex: 2024" required />

      <label for="genero">Gênero</label>
      <select name="genero" id="genero" required>
        <option value="" disabled {{ 'selected' if not filme else '' }}>Selecione o gênero</option>
        {% for g in generos %}
        <option value="{{ g }}" {{ 'selected' if filme and filme.genero == g else '' }}>{{ g }}</option>
        {% endfor %}
      </select>

      <label for="faixa_etaria">Faixa Etária</label>
      <input type="number" name="faixa_etaria" id="faixa_etaria" value="{{ filme.faixa_etaria if filme else '' }}" placeholder="Ex: 12 (0 para Livre)" required />

      <label for="capa">URL da Capa (opcional)</label>
      <input type="text" name="capa" id="capa" value="{{ filme.capa if filme else '' }}" placeholder="Ex: /static/imgs/foto.jpg" />

      <button type="submit" class="botao-form">{{ 'Salvar Alterações' if filme else 'Cadastrar Filme' }}</button>
    </form>

    <div class="ja-tem-conta">
      <a href="{{ url_for('listar_filmes') }}"> ⬅ Voltar para lista </a>
    </div>
  </div>
</div>
{% endblock %}

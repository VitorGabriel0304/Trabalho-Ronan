{% extends "base.html" %}

{% block conteudo %}
<div class="linha-centro">
  <div class="cadastro-card cadastro-card-funcao">
    <h2>⚙️ Cadastrar Função</h2>

    <form action="{{ url_for('inserir_funcoes') }}" method="POST">
      <!-- Nome da função -->
      <label for="nome">Nome da Função</label>
      <input
        type="text"
        name="nome"
        id="nome"
        placeholder="Ex.: Administrador, Supervisor, Operador"
        required
      />

      <!-- Status -->
      <label for="status">Status</label>
      <select name="status" id="status" required>
        <option value="" selected disabled>Selecione o status</option>
        <option value="Ativo">Ativo</option>
        <option value="Inativo">Inativo</option>
      </select>

      <!-- Descrição -->
      <label for="descricao">Descrição</label>
      <textarea
        name="descricao"
        id="descricao"
        rows="4"
        placeholder="Descreva as responsabilidades desta função"
        required
      ></textarea>

      <!-- Permissões -->
      <fieldset class="grupo-permissoes">
        <legend>Permissões</legend>

        <label class="opcao-permissao" for="perm_dashboard">
          <input type="checkbox" name="permissoes" id="perm_dashboard" value="Dashboard" />
          <span>Dashboard</span>
        </label>

        <label class="opcao-permissao" for="perm_usuarios">
          <input type="checkbox" name="permissoes" id="perm_usuarios" value="Gerenciar Usuário" />
          <span>Gerenciar usuário</span>
        </label>

        <label class="opcao-permissao" for="perm_tarefas">
          <input type="checkbox" name="permissoes" id="perm_tarefas" value="Gerenciar Tarefa" />
          <span>Gerenciar tarefa</span>
        </label>

        <label class="opcao-permissao" for="perm_relatorios">
          <input type="checkbox" name="permissoes" id="perm_relatorios" value="Emitir Relatórios" />
          <span>Emitir relatórios</span>
        </label>

        <label class="opcao-permissao" for="perm_funcoes">
          <input type="checkbox" name="permissoes" id="perm_funcoes" value="Gerenciar Funções" />
          <span>Gerenciar funções</span>
        </label>
      </fieldset>

      <button type="submit" class="botao-form">Cadastrar Função</button>
    </form>

    <div class="ja-tem-conta">
      <a href="{{ url_for('listar_funcoes') }}">⬅ Voltar para lista</a>
    </div>
  </div>
</div>
{% endblock %}

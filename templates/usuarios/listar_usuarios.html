{% extends "base.html" %}

{% block conteudo %}
<div class="container">
    <h1 class="titulo-usuario">Lista de Usuários</h1>

    <!-- Botão para adicionar usuário -->
    <div class="acoes-usuario">
        <a href="/usuarios/inserir" class="add-usuario">Adicionar Usuário</a>
    </div>

    <!-- Tabela de usuários -->
    <div class="tabela-usuario">
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Registro</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for usuario in usuarios %}
                <tr>
                    <td>{{ usuario.nome }}</td>
                    <td>{{ usuario.email }}</td>
                    <td>{{ loop.index }}</td>
                    <td>
                        <button class="btn-editar">Editar</button>
                        <button class="btn-excluir">Excluir</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

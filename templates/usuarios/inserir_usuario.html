{% extends "base.html" %}

{% block conteudo %}
<div class="linha-centro">
  <div class="cadastro-card">
    <h2>{{ '👤 Editar Usuário' if usuario else '👤 Cadastrar Usuário' }}</h2>

    <form action="{{ url_for('editar_usuario', id=usuario.id) if usuario else url_for('inserir_usuarios') }}" method="POST">

      <label for="nome">Nome</label>
      <input type="text" name="nome" id="nome" value="{{ usuario.nome if usuario else '' }}" placeholder="Digite o nome" required />

      <label for="idade">Idade</label>
      <input type="number" name="idade" id="idade" value="{{ usuario.idade if usuario else '' }}" placeholder="Digite a idade" min="1" required />

      <label for="email">E-mail</label>
      <input type="email" name="email" id="email" value="{{ usuario.email if usuario else '' }}" placeholder="Digite o e-mail" required />

      <label for="funcao">Função</label>
      <select name="funcao" id="funcao" required>
        <option value="" disabled {{ 'selected' if not usuario else '' }}>Selecione a função</option>
        <option value="Administrador" {{ 'selected' if usuario and usuario.funcao == 'Administrador' else '' }}>Administrador</option>
        <option value="Usuário" {{ 'selected' if usuario and usuario.funcao == 'Usuário' else '' }}>Usuário</option>
        <option value="Gerente" {{ 'selected' if usuario and usuario.funcao == 'Gerente' else '' }}>Gerente</option>
        <option value="Supervisor" {{ 'selected' if usuario and usuario.funcao == 'Supervisor' else '' }}>Supervisor</option>
        <option value="Suporte" {{ 'selected' if usuario and usuario.funcao == 'Suporte' else '' }}>Suporte</option>
      </select>

      <label for="senha">{{ 'Nova Senha (deixe em branco para não alterar)' if usuario else 'Senha' }}</label>
      <input type="password" name="senha" id="senha" placeholder="Digite a senha" {{ 'required' if not usuario else '' }} />

      {% if not usuario %}
      <label for="confirmar">Confirmar Senha</label>
      <input type="password" name="confirmar" id="confirmar" placeholder=" Repita a senha" required />
      {% endif %}

      <button type="submit" class="botao-form">{{ 'Salvar Alterações' if usuario else 'Cadastrar' }}</button>
    </form>

    <div class="ja-tem-conta">
      <a href="{{ url_for('listar_usuarios') }}"> ⬅ Voltar para lista </a>
    </div>
  </div>
</div>
{% endblock %}

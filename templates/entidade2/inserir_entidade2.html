{% extends "base.html" %}

{% block conteudo %}

<div class="linha-centro">
    <div class="cadastro-card">

        <h2>🎬 Adicionar Filme</h2>

        <form action="{{ url_for('inserir_filmes') }}" method="POST">

            <!-- Título (obrigatório) -->
            <label for="titulo">Título</label>
            <input type="text" name="titulo" id="titulo" placeholder="Digite o título" required>

            <!-- Ano (obrigatório) -->
            <label for="ano">Ano De Publicação</label>
            <input type="number" name="ano" id="ano" placeholder="Ex: 2024"
                   inputmode="numeric" pattern="[0-9]*" required>

            <!-- Gênero (obrigatório) -->
            <label for="genero">Gênero</label>
            <select name="genero" id="genero" required>
                <option value="">Selecione um gênero</option>
                {% for genero in generos %}
                    <option value="{{ genero }}">{{ genero }}</option>
                {% endfor %}
            </select>

            <!-- Faixa Etária (obrigatório) -->
            <label for="faixa_etaria">Faixa Etária</label>
            <select name="faixa_etaria" id="faixa_etaria" required>
                <option value="">Selecione a faixa etária</option>
                <option value="10">10+</option>
                <option value="12">12+</option>
                <option value="14">14+</option>
                <option value="16">16+</option>
                <option value="18">18+</option>
            </select>

            <!-- Capa (opcional) -->
            <label for="capa">Capa (opcional)</label>
            <input type="text" name="capa" id="capa" placeholder="Cole a URL da imagem">

            <!-- Botão Adicionar -->
            <button type="submit" class="botao-form">
                Adicionar
            </button>

        </form>

        <!-- Voltar para lista -->
        <div class="ja-tem-conta">
            <a href="{{ url_for('listar_filmes') }}">
                ⬅ Voltar para lista
            </a>
        </div>

    </div>
</div>

{% endblock %}

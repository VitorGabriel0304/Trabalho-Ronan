{% extends "base.html" %}

{% block conteudo %}
<div class="container">
    <h1 class="titulo-usuario">Lista de Filmes</h1>

    <!-- Botão para adicionar filme -->
    <div class="acoes-usuario">
        <a href="{{ url_for('inserir_filmes') }}" class="add-usuario">Adicionar Filme</a>
    </div>

    <!-- Tabela de filmes -->
    <div class="tabela-usuario">
        <table>
            <thead>
                <tr>
                    <th>Registro</th>
                    <th>Capa</th> 
                    <th>Título</th>
                    <th>Ano</th>
                    <th>Gênero</th>
                    <th>Nota</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody>
                {% for filme in filmes %}
                <tr>

                    <!-- Registro -->
                    <td>{{ loop.index }}</td>

                    <!-- Capa -->
                    <td>
                        <img 
                            src="{{ filme.capa if filme.capa else 'https://via.placeholder.com/60x90' }}"
                            alt="Capa do filme"
                            style="width: 60px; height: 90px; object-fit: cover; border-radius: 8px;">
                    </td>

                    <!-- Dados -->
                    <td>{{ filme.titulo }}</td>
                    <td>{{ filme.ano }}</td>
                    <td>{{ filme.genero }}</td>
                    <td>{{ filme.nota }}</td>

                    <!-- Ações -->
                    <td>
                        <button class="btn-editar">Editar</button>
                        <button class="btn-excluir">Excluir</button>
                    </td>

                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
